<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width,initial-scale=1" />
<title>ChordPlay — The Interactive Numbered Chord Player</title>

<style>
:root{--bg:#f8f7f5;--card:#fff;--accent:#89b6a5;--muted:#666;}
body{font-family:system-ui;background:var(--bg);margin:0;padding:18px;display:flex;justify-content:center}
.app{max-width:980px;width:100%}
.card{background:var(--card);padding:12px;border-radius:12px;box-shadow:0 6px 20px rgba(0,0,0,0.06);margin-bottom:12px}
.keybtn{padding:10px;border:none;border-radius:10px;background:#f2f2f7;cursor:pointer}
.keybtn.active{background:var(--accent);color:white}
.keys{display:flex;gap:8px;flex-wrap:wrap}
#chordName{margin-top:10px;text-align:center;font-weight:700}
</style>
</head>

<body>
<div class="app">

<div class="card">
<label>Key</label>
<select id="keySelect">
<option value="0">C</option><option value="1">C# / Db</option>
<option value="2">D</option><option value="3">Eb</option>
<option value="4">E</option><option value="5">F</option>
<option value="6">F#</option><option value="7">G</option>
<option value="8">Ab</option><option value="9">A</option>
<option value="10">Bb</option><option value="11">B</option>
</select>
</div>

<div class="card">
<label>Chord Type</label>
<div id="qualityBtns">
<button class="keybtn active" data-quality="major">Major</button>
<button class="keybtn" data-quality="minor">Minor</button>
<button class="keybtn" data-quality="dim">Dim</button>
<button class="keybtn" data-quality="aug">Aug</button>
</div>
</div>

<div class="card">
<label>Inversion</label>
<button class="keybtn" id="inv1">1st Inv</button>
<button class="keybtn" id="inv2">2nd Inv</button>
</div>

<div class="card">
<label>Chords</label>
<div class="keys" id="keysRow">
<button class="keybtn" data-degree="1">1</button>
<button class="keybtn" data-degree="2">2</button>
<button class="keybtn" data-degree="3">3</button>
<button class="keybtn" data-degree="4">4</button>
<button class="keybtn" data-degree="5">5</button>
<button class="keybtn" data-degree="6">6</button>
<button class="keybtn" data-degree="7">7</button>
</div>
<div id="chordName"></div>
</div>

</div>

<script>
const chordIntervals={major:[0,4,7],minor:[0,3,7],dim:[0,3,6],aug:[0,4,8]};
const scaleOffsets=[0,2,4,5,7,9,11];

let inv1Held=false;
let inv2Held=false;

function bindHold(id,onDown,onUp){
  const el=document.getElementById(id);
  el.addEventListener("mousedown",onDown);
  el.addEventListener("mouseup",onUp);
  el.addEventListener("mouseleave",onUp);
  el.addEventListener("touchstart",e=>{e.preventDefault();onDown();});
  el.addEventListener("touchend",onUp);
}

bindHold("inv1",()=>{inv1Held=true;inv2Held=false;},()=>{inv1Held=false;});
bindHold("inv2",()=>{inv2Held=true;inv1Held=false;},()=>{inv2Held=false;});

const AudioContext=window.AudioContext||window.webkitAudioContext;
const ctx=new AudioContext();

function playFreq(freq){
  const o=ctx.createOscillator();
  const g=ctx.createGain();
  o.connect(g);g.connect(ctx.destination);
  o.frequency.value=freq;
  g.gain.value=0.2;
  o.start();
  g.gain.exponentialRampToValueAtTime(0.0001,ctx.currentTime+1);
  o.stop(ctx.currentTime+1);
}

function midiToFreq(m){return 440*Math.pow(2,(m-69)/12);}

function playChord(deg){
  const key=parseInt(document.getElementById('keySelect').value);
  const qual=document.querySelector('#qualityBtns .active').dataset.quality;

  const root=60+key+scaleOffsets[deg-1];
  const intervals=chordIntervals[qual];

  let bass;

  if(inv1Held){
    bass=root+intervals[1]-12;
  }else if(inv2Held){
    bass=root+intervals[2]-12;
  }else{
    bass=root-12;
  }

  playFreq(midiToFreq(bass));
  intervals.forEach(i=>playFreq(midiToFreq(root+i)));

  showChordName(key,deg,qual);
}

function nameFor(n){
  const names=["C","C#","D","Eb","E","F","F#","G","Ab","A","Bb","B"];
  return names[n%12];
}

function showChordName(key,deg,qual){
  const root=(key+scaleOffsets[deg-1])%12;
  const r=nameFor(root);
  const ints=chordIntervals[qual];

  let txt=r;

  if(inv1Held){
    txt=`${r}/${nameFor(root+ints[1])}`;
  }else if(inv2Held){
    txt=`${r}/${nameFor(root+ints[2])}`;
  }

  document.getElementById("chordName").textContent=txt;
}

document.getElementById("keysRow").addEventListener("click",e=>{
  const b=e.target.closest("button");
  if(!b)return;
  playChord(parseInt(b.dataset.degree));
});

document.getElementById("qualityBtns").addEventListener("click",e=>{
  const b=e.target.closest("button");
  if(!b)return;
  document.querySelectorAll("#qualityBtns button").forEach(x=>x.classList.remove("active"));
  b.classList.add("active");
});
</script>

</body>
</html>
